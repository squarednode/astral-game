  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud">
      <div class="panel top-left">
        <h1>Astral Swap</h1>
        <div id="objective">Defeat enemies and test the party rotation.</div>
        <div class="controls">WASD move · Mouse aim · LMB attack · Q/E skills · Space dodge · 1–4 swap · I inventory</div>
      </div>

      <div id="lootFeed" class="loot-feed"></div>

    </div>
    <div id="inventory" class="modal hidden">
      <div class="inventory-card">
        <div class="inventory-head"><h2>Party Stash</h2><button id="closeInventory">Close [I]</button></div>
        <p>Click an item to equip it to the active character. Legendary powers alter team rotations.</p>
        <div id="equipped"></div>
        <div id="itemGrid" class="item-grid"></div>
      </div>
    </div>
    <div id="gameOver" class="modal hidden"><div class="gameover-card"><h2>Party Defeated</h2><p id="finalScore"></p><button id="restart">Restart Run</button></div></div>
